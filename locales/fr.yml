fr:
  skip_to_content: Aller au contenu principal
  about:
    application: application web en code ouvert
    other_orgs: de nombreuses autres organisations
    text: Initialement créée pour simplifier la gestion de %{ragedevert}, CSA Admin n'a cessé de s'améliorer et de s'agrandir au fil des années pour répondre aux besoins divers et variés %{other_orgs}. CSA Admin est une %{application}. Elle se veut simple, efficace et intuitive. Elle est développée avec passion par %{author}, qui s'engage depuis plus de 10 ans à simplifier la vie des ACP pour les aider à prospérer.
    title: À propos de CSA Admin
  call_to_action: Explorer la démo
  contact:
    text: Vous pouvez explorer une installation démo par vous-même pour vous faire une idée du fonctionnement. Si vous avez des questions ou préférez une visite guidée, écrivez-moi simplement à %{mail}.
    title: Intéressé·e? Explorez la démo!
  demo_url: https://admin.acp-admin.ch/demo/new
  email: E-mail
  features:
    activity:
      description: Vos membres participent au travail dans les champs ou à la préparation des paniers? Tout est fourni pour vous aider à <strong>gérer vos activités</strong>, les inscriptions et les validations de chaque participation.
      title: Participation des membres
    basket_content:
      description: Répartissez efficacement vos récoltes entre tous vos abonné·e·s, en fonction de la taille/prix des paniers. Suivez l'évolution de la valeur de vos paniers et des légumes au cours de l'année.
      title: Contenu et valeur des paniers
    billing:
      description: Génération et envoi des <strong>factures QR</strong> avec numéro de référence par e-mail, <strong>relevé quotidien des paiements</strong> sur votre compte bancaire (EBICS), envoi des rappels, tout est automatisé!
      title: Facturation automatisée
    communication:
      description: Chaque e-mail envoyé à vos membres peut être facilement modifié. Choisissez le contenu et le style qui vous conviennent. Un système sophistiqué de <strong>newsletter</strong> est également intégré.
      title: Communication personnalisée
    deliveries:
      description: Planifiez facilement vos livraisons. Des besoins spéciaux, deux livraisons par semaine? Une semaine sur deux? C'est possible! Les <strong>absences</strong> sont également automatiquement déduites.
      title: Calendrier des livraisons
    memberships:
      description: Formulaire d'inscription, liste d'attente, <strong>paniers à l'essai</strong>, compléments, … tout est prévu pour gérer efficacement vos membres, en conformité avec le <strong>RGPD/nLPD</strong>.
      title: Membres et abonnements
    opencode:
      description: Entièrement traduite en français, allemand, italien, néerlandais et anglais, CSA Admin est aussi développée en %{opencode_link} sous la %{license_link}, vous pouvez donc participer et proposer des améliorations.
      license: licence O'Saasy
      opencode: code ouvert
      title: Multilingue et code ouvert
    renewal:
      description: C'est la fin de l'année? En un clic, envoyez rapidement une demande de renouvellement à tous vos abonné·e·s. Un formulaire de <strong>renouvellement/résiliation</strong> les attend sur leur compte de membre.
      title: Renouvellement simplifié
    shop:
      description: Proposez à vos abonné·e·s des <strong>produits supplémentaires</strong> pour agrémenter leur panier à chaque livraison. Un shop en ligne est à leur disposition sur leur compte de membre. Gestion de stock incluse!
      title: Épicerie en ligne
    subtitle: CSA Admin vous offre un large éventail de fonctionnalités développées spécifiquement pour les besoins de <span class='whitespace-nowrap'>l'<strong class='text-logo-green'>A</strong>griculture <strong class='text-logo-green'>C</strong>ontractuelle de <strong class='text-logo-green'>P</strong>roximité</span>.
    subtitle2: Chaque ACP est unique, certains modules sont donc optionnels, à votre convenance. D'autres besoins? Il suffit de demander!
    title: Tout ce qu'il vous faut …
    title2: … et bien plus encore!
  footer:
    developed_by: CSA Admin est développée avec passion par %{author_link}.
  header:
    about: À propos
    demo: Démo
    features: Fonctionnalités
    pricing: Prix
  logo_alt: Logo de CSA Admin
  org_name: ACP
  org_name_definition: Agriculture Contractuelle de Proximité
  organizations:
    logo_alt: "Logo de %{name}"
    subtitle: Que vous soyez une association, une coopérative, une entreprise ou un particulier, CSA Admin s'adapte à vos besoins.
    title: "Ces organisations utilisent <span class='whitespace-nowrap'>CSA Admin</span>"
  phone: Téléphone
  pricing:
    title: Un prix simple et juste
    subtitle: du montant facturé par CSA Admin, à payer une fois par an.
    hosting: Hébergement entièrement géré, conforme RGPD/nLPD
    security: Mises à jour de sécurité, backup, et maintenance
    features_included: Toutes les fonctionnalités et amélioration continue
    emails: Envoi d'emails inclus (newsletters et notifications)
    support: Support direct et personnalisé par email
    opencode: Code source disponible, aucune dépendance
    description: Le coût grandit avec vous. Les petites ACP paient peu, les grandes sont plafonnées à 2'400 CHF/EUR par an.
    description_bold: Pas de supplément, pas de frais de mise en place, tout est inclus.
  site:
    description: Application web en code ouvert pour gérer efficacement votre ACP (Agriculture Contractuelle de Proximité). Explorez la démo librement!
    title: CSA Admin - Simplifiez la gestion de votre ACP
    path: /acp/
  subtitle: Depuis 2014, %{orgs_link} utilisent CSA Admin pour faciliter leurs tâches quotidiennes et gérer la distribution annuelle de plus de <span class='font-semibold'>%{baskets_count} paniers</span>. Rejoignez-les !
  subtitle_orgs_link: <span class="whitespace-nowrap">de nombreuses organisations</span>
  title: Simplifiez la gestion de <span class="whitespace-nowrap">votre %{org_name}.</span>
