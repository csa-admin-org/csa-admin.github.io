de:
  skip_to_content: Zum Hauptinhalt springen
  about:
    application: quelloffene Webanwendung
    other_orgs: zahlreichen anderen Organisationen
    text: Ursprünglich entwickelt, um die Verwaltung von %{ragedevert} zu vereinfachen, entwickelt sich CSA Admin stetig weiter, um den vielfältigen Anforderungen von %{other_orgs} gerecht zu werden. CSA Admin ist eine %{application}. Es soll einfach, effizient und intuitiv sein. Mit Leidenschaft entwickelt %{author} CSA Admin seit über 10 Jahren, um den Alltag in Solawis zu erleichtern.
    title: Über CSA Admin
  call_to_action: Die Demo entdecken
  contact:
    text: Du kannst eine Demo-Installation selbst erkunden, um dir einen Eindruck zu verschaffen. Bei Fragen oder wenn du eine geführte Tour bevorzugst, schreib mir einfach an %{mail}.
    title: Interessiert? Entdecke die Demo!
  demo_url: https://admin.solawi-admin.org/demo/new
  email: E-Mail
  features:
    activity:
      description: Beteiligen sich deine Mitglieder an Feldarbeit oder der Vorbereitung der Lieferungen? CSA Admin unterstützt dich bei Planung, Koordination und Bestätigung der Einsätze.
      title: Mitgliederbeteiligung
    basket_content:
      description: Verteile deine Ernten effizient, indem du die Grösse oder den Preis der Anteile berücksichtigst, und behalte dabei stets den Wert deiner Anteile sowie den Ernteverlauf im Blick.
      title: Anteilinhalt und -wert
    billing:
      description: Erstellt und versendet QR-Rechnungen, überwacht tägliche Zahlungseingänge (EBICS), unterstützt <strong>SEPA-Lastschriften</strong> und verschickt automatisch Mahnungen.
      title: Automatisierte Abrechnung
    communication:
      description: Passe jede E-Mail individuell an, von Inhalt bis Stil. Ein integriertes <strong>Newsletter</strong>-System macht's möglich.
      title: Personalisierte Kommunikation
    deliveries:
      description: Plane deine Lieferungen flexibel, egal ob zwei Lieferungen pro Woche oder jede zweite Woche. Abwesenheiten werden automatisch berücksichtigt.
      title: Lieferplan
    memberships:
      description: Anmeldeformular, Warteliste, <strong>Probianteile</strong>, Zusatzanteile, … alles ist vorhanden, um deine Mitglieder effizient zu verwalten. <strong>DSGVO/nDSG</strong>-konform.
      title: Mitglieder und Abonnements
    opencode:
      description: Verfügbar in Französisch, Deutsch, Italienisch, Niederländisch und Englisch. CSA Admin ist zudem als %{opencode_link} unter der %{license_link} erhältlich, so kannst du aktiv mitgestalten.
      license: O'Saasy-Lizenz
      opencode: Quelloffene Anwendung
      title: Mehrsprachig und quelloffen
    renewal:
      description: Sende mit einem Klick eine <strong>Verlängerungsanfrage</strong> an alle Abonnenten. Eine <strong>Beitragsrunde</strong> ermöglicht danach solidarische Preisgestaltung.
      title: Vereinfachte Verlängerung
    shop:
      description: Erweitere dein Angebot! Im integrierten Online-Shop können Abonnenten zusätzliche Produkte bestellen, inklusive Bestandsverwaltung.
      title: Online-Shop
    subtitle: "CSA Admin bietet dir eine breite Palette von Funktionen, die speziell für die Bedürfnisse der <span class='whitespace-nowrap'><strong class='text-logo-green'>So</strong>lidarischen <strong class='text-logo-green'>La</strong>nd<strong class='text-logo-green'>wi</strong>rtschaft</span> ausgerichtet wurden."
    subtitle2: "Jede Solawi ist einzigartig, daher sind einige Module optional, ganz nach deinem Bedarf. Weitere Bedürfnisse? Einfach fragen!"
    title: "Alles, was du brauchst …"
    title2: "… und noch viel mehr!"
  footer:
    developed_by: CSA Admin wird mit Leidenschaft von %{author_link} entwickelt.
  header:
    about: Über
    demo: Demo
    features: Funktionen
    pricing: Preis
  logo_alt: "CSA Admin Logo"
  org_name: "Solawi"
  org_name_definition: "Solidarische Landwirtschaft"
  organizations:
    logo_alt: "Logo von %{name}"
    subtitle: Ob Verein, Genossenschaft, Unternehmen oder Einzelperson, CSA Admin passt sich deinen Bedürfnissen an.
    title: Sie nutzen CSA Admin
  phone: Telefon
  pricing:
    title: Einfache, faire Preisgestaltung
    subtitle: des über CSA Admin fakturierten Betrags, einmal jährlich zu bezahlen.
    hosting: Vollständig verwaltetes Hosting, DSGVO/nDSG-konform
    security: Sicherheitsupdates, Backups und Wartung
    features_included: Alle Funktionen und kontinuierliche Verbesserung
    emails: E-Mail-Versand inklusive (Newsletter und Benachrichtigungen)
    support: Direkter und persönlicher E-Mail-Support
    opencode: Quellcode verfügbar, keine Abhängigkeit
    description: Die Kosten wachsen mit deiner Solawi. Kleine Solawis zahlen wenig, grosse sind bei 2'400 CHF/EUR/Jahr gedeckelt.
    description_bold: Kein Aufpreis, keine Einrichtungskosten, alles ist inklusive.
  site:
    description: Quelloffene Webanwendung für effiziente Solawi-Verwaltung (Solidarische Landwirtschaft). Entdecke die Demo!
    title: "CSA Admin - Effizientere Verwaltung deiner Solawi"
    path: /solawi/
  subtitle: Seit 2014 nutzen %{orgs_link} CSA Admin, um ihre täglichen Aufgaben zu erleichtern und die jährliche Verteilung von über <span class='font-semibold'>%{baskets_count} Anteilen</span> zu verwalten. Mach mit!
  subtitle_orgs_link: <span class="whitespace-nowrap">zahlreiche Organisationen</span>
  title: Effizientere <span class="whitespace-nowrap">%{org_name}-Verwaltung.</span>
