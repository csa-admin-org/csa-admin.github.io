de:
  skip_to_content: Zum Hauptinhalt springen
  about:
    application: quelloffene Webanwendung
    other_orgs: zahlreichen anderen Organisationen
    text: Ursprünglich entwickelt, um die Verwaltung von %{ragedevert} zu vereinfachen, entwickelt sich CSA Admin stetig weiter, um den vielfältigen Anforderungen von %{other_orgs} gerecht zu werden. CSA Admin ist eine %{application}. Es soll einfach, effizient und intuitiv sein. Mit Leidenschaft entwickelt %{author} CSA Admin seit über 10 Jahren, um den Alltag in CSAs zu erleichtern.
    title: Über CSA Admin
  call_to_action: Die Demo entdecken
  contact:
    text: Sie können eine Demo-Installation selbst erkunden, um sich einen Eindruck zu verschaffen. Bei Fragen oder wenn Sie eine geführte Tour bevorzugen, schreiben Sie mir einfach an %{mail}.
    title: Interessiert? Entdecken Sie die Demo!
  demo_url: https://admin.solawi-admin.org/demo/new
  email: E-Mail
  features:
    activity:
      description: Beteiligen sich Ihre Mitglieder an Feldarbeit oder der Vorbereitung der Lieferungen? CSA Admin unterstützt Sie bei Planung, Koordination und Bestätigung der Einsätze.
      title: Mitgliederbeteiligung
    basket_content:
      description: Verteilen Sie Ihre Ernten effizient, indem Sie die Größe oder den Preis der Anteile berücksichtigen – und behalten Sie dabei stets den Wert Ihrer Anteile sowie den Ernteverlauf im Blick.
      title: Anteilinhalt und -wert
    billing:
      description: Erstellt und versendet QR-Rechnungen, überwacht tägliche Zahlungseingänge (EBICS), unterstützt <strong>SEPA-Lastschriften</strong> und verschickt automatisch Mahnungen.
      title: Automatisierte Abrechnung
    communication:
      description: Passen Sie jede E-Mail individuell an – von Inhalt bis Stil. Ein integriertes <strong>Newsletter</strong>-System macht's möglich.
      title: Personalisierte Kommunikation
    deliveries:
      description: Planen Sie Ihre Lieferungen flexibel – egal, ob zwei Lieferungen pro Woche oder jede zweite Woche. Abwesenheiten werden automatisch berücksichtigt.
      title: Lieferplan
    memberships:
      description: Anmeldeformular, Warteliste, <strong>Probianteile</strong>, Zusatzanteile, … alles ist vorhanden, um Ihre Mitglieder effizient zu verwalten. <strong>DSGVO/nDSG</strong>-konform.
      title: Mitglieder und Abonnements
    opencode:
      description: Verfügbar in Französisch, Deutsch, Italienisch, Niederländisch und Englisch – CSA Admin ist zudem als %{opencode_link} unter der %{license_link} erhältlich. So können Sie aktiv mitgestalten.
      license: O'Saasy-Lizenz
      opencode: Quelloffene Anwendung
      title: Mehrsprachig und quelloffen
    renewal:
      description: Senden Sie mit einem Klick eine <strong>Verlängerungsanfrage</strong> an alle Abonnenten. Eine <strong>Bieterunde</strong> ermöglicht danach solidarische Preisgestaltung.
      title: Vereinfachte Verlängerung
    shop:
      description: Erweitern Sie Ihr Angebot – im integrierten Online-Shop können Abonnenten zusätzliche Produkte bestellen, inklusive Bestandsverwaltung.
      title: Online-Shop
    subtitle: "CSA Admin bietet Ihnen eine breite Palette von Funktionen, die speziell für die Bedürfnisse der <span class='whitespace-nowrap'><strong class='text-logo-green'>So</strong>lidarischen <strong class='text-logo-green'>La</strong>nd<strong class='text-logo-green'>wi</strong>rtschaft</span> ausgerichtet wurden."
    subtitle2: "Jede Solawi ist einzigartig, daher sind einige Module optional, nach Ihrem Ermessen. Weitere Bedürfnisse? Einfach fragen!"
    title: "Alles, was Sie brauchen …"
    title2: "… und noch viel mehr!"
  footer:
    developed_by: CSA Admin wird mit Leidenschaft von %{author_link} entwickelt.
  header:
    about: Über
    demo: Demo
    features: Funktionen
    pricing: Preis
